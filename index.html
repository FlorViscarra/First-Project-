<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartWardrobe | Your AI Stylist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2 { font-family: 'Playfair Display', serif; }
        .animate-fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-md mx-auto px-4 h-16 flex items-center justify-between">
            <span class="text-xl font-bold tracking-tight text-indigo-600">SmartWardrobe</span>
            <div class="flex space-x-4">
                <button onclick="showSection('home')" class="text-sm font-medium hover:text-indigo-600">Home</button>
                <button onclick="showSection('closet')" class="text-sm font-medium hover:text-indigo-600">Closet</button>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-4 py-8">
        
        <section id="home-section" class="space-y-6">
            <header class="text-center">
                <h1 class="text-4xl font-bold mb-2">Ready to Shine?</h1>
                <p class="text-slate-500">Tell me the vibe, and I'll find the perfect look.</p>
            </header>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-2">Where are you going?</label>
                    <select id="occasion" class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 cursor-pointer">
                        <option value="work">The Office</option>
                        <option value="date">Date Night</option>
                        <option value="brunch">Sunday Brunch</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-semibold mb-2">What's the weather?</label>
                    <select id="weather" class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 cursor-pointer">
                        <option value="hot">Sunny & Hot</option>
                        <option value="cold">Chilly / Cold</option>
                        <option value="rainy">Rainy</option>
                    </select>
                </div>

                <button onclick="generateOutfit()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 transition shadow-lg shadow-indigo-200 active:scale-95">
                    Curate My Look
                </button>
            </div>

            <div id="result-container"></div>
        </section>

        <section id="closet-section" class="hidden space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-bold">My Digital Closet</h2>
                <button class="bg-slate-900 text-white px-4 py-2 rounded-lg text-sm">+ Add Item</button>
            </div>
            <div class="text-center py-12 border-2 border-dashed border-slate-200 rounded-3xl">
                <p class="text-slate-400">Your closet is empty. Start adding your favorite pieces!</p>
            </div>
        </section>

    </main>

    <script>
        // 1. DATA: Our "Style Matrix"
        const styleMatrix = [
            { occasion: 'work', weather: 'hot', title: 'The Power Linen Look', items: 'Linen Blazer + Tailored Shorts + Loafers', tip: 'Stay cool but professional.' },
            { occasion: 'work', weather: 'cold', title: 'The Executive Layer', items: 'Turtleneck + Wool Trousers + Long Coat', tip: 'Monochrome colors look more expensive.' },
            { occasion: 'work', weather: 'rainy', title: 'Modern Commuter', items: 'Trench Coat + Ankle Boots + Slim Slacks', tip: 'A chic umbrella is your best accessory.' },
            { occasion: 'date', weather: 'hot', title: 'Summer Romance', items: 'Silk Slip Dress + Strappy Sandals', tip: 'Add gold jewelry for a glow.' },
            { occasion: 'date', weather: 'cold', title: 'Chic Layers', items: 'Knit Midi Dress + Tall Boots + Leather Jacket', tip: 'Texture mixing is key for winter dates.' },
            { occasion: 'date', weather: 'rainy', title: 'Intimate Evening', items: 'Velvet Blazer + Dark Jeans + Pointed Flats', tip: 'Stay cozy and sophisticated.' },
            { occasion: 'brunch', weather: 'hot', title: 'Boho Sunday', items: 'Floral Maxi + Denim Jacket + Wedges', tip: 'Comfortable but photogenic.' },
            { occasion: 'brunch', weather: 'cold', title: 'Cozy Morning', items: 'Oversized Sweater + Leggings + Ankle Boots', tip: 'Add a scarf for extra flair.' },
            { occasion: 'brunch', weather: 'rainy', title: 'Cloudy Comfort', items: 'Rain Mac + Cute Rainboots + Knit Set', tip: 'Pastel colors brighten a gray day.' }
        ];

        // 2. LOGIC: Navigation
        function showSection(sectionId) {
            document.getElementById('home-section').classList.toggle('hidden', sectionId !== 'home');
            document.getElementById('closet-section').classList.toggle('hidden', sectionId !== 'closet');
            // Hide result when switching sections
            if(sectionId === 'closet') document.getElementById('result-container').innerHTML = '';
        }

        // 3. LOGIC: The Stylist Engine
        function generateOutfit() {
            const selectedOccasion = document.getElementById('occasion').value;
            const selectedWeather = document.getElementById('weather').value;

            const match = styleMatrix.find(item => 
                item.occasion === selectedOccasion && item.weather === selectedWeather
            );

            if (match) {
                const resultContainer = document.getElementById('result-container');
                
                resultContainer.innerHTML = `
                    <div class="mt-8 p-6 bg-white border border-indigo-100 rounded-3xl shadow-xl animate-fade-in">
                        <h3 class="text-indigo-600 font-bold uppercase text-xs tracking-widest mb-1">Your Curated Look</h3>
                        <h2 class="text-2xl font-bold mb-3">${match.title}</h2>
                        <p class="text-lg text-slate-700 mb-4 font-light">${match.items}</p>
                        <div class="bg-indigo-50 p-3 rounded-xl border border-indigo-100 italic text-sm text-indigo-700">
                            <strong>Pro Tip:</strong> ${match.tip}
                        </div>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
