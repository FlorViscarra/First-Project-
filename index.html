        window.showSection = function(sectionId) {
            document.getElementById('home-section').classList.toggle('hidden', sectionId !== 'home');
            document.getElementById('closet-section').classList.toggle('hidden', sectionId !== 'closet');
            if(sectionId === 'closet') document.getElementById('result-container').innerHTML = '';

        window.generateOutfit = function() {
            const selectedOccasion = document.getElementById('occasion').value;
            const selectedWeather = document.getElementById('weather').value;

            const match = styleMatrix.find(item => 
                item.occasion === selectedOccasion && item.weather === selectedWeather
            );

            if (match) {
                const resultContainer = document.getElementById('result-container');
                resultContainer.innerHTML = `
                    <div class="mt-8 p-6 bg-white border border-indigo-100 rounded-3xl shadow-xl animate-fade-in">
                        <h3 class="text-indigo-600 font-bold uppercase text-xs tracking-widest mb-1">Your Curated Look</h3>
